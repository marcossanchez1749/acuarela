<body class="antialiased overflow-x-hidden relative text-premium-text bg-premium-bg">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 4. Animaciones de Scroll (Reveal Effects)
        const useScrollReveal = () => {
            const [isVisible, setIsVisible] = useState(false);
            const domRef = useRef();
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    });
                }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
                
                const current = domRef.current;
                if (current) observer.observe(current);
                return () => { if (current) observer.unobserve(current); };
            }, []);
            return [domRef, isVisible];
        };

        const Reveal = ({ children, className = "", delay = "" }) => {
            const [ref, isVisible] = useScrollReveal();
            return (
                <div 
                    ref={ref} 
                    className={`transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.5,1)] ${isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-12"} ${delay} ${className}`}
                >
                    {children}
                </div>
            );
        };

            ShoppingBag: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></svg>,

            Clock: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
            Instagram: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5" /><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" /><line x1="17.5" y1="6.5" x2="17.51" y2="6.5" /></svg>,

        };

                            <a href="#servicios" onClick={() => setIsMenuOpen(false)} className="text-premium-dark text-sm font-medium uppercase tracking-[0.15em] border-b border-premium-border pb-4">Nuestra Oferta</a>
                            <a href="#contacto" onClick={() => setIsMenuOpen(false)} className="text-premium-dark text-sm font-medium uppercase tracking-[0.15em] border-b border-premium-border pb-4">Contacto</a>
                            <a href="#reservar" onClick={() => setIsMenuOpen(false)} className="btn-primary text-center py-4 uppercase text-xs font-semibold tracking-widest mt-2">Reservar Mesa</a>
                        </div>
                    </div>
                </header>
            );
        };

        // 3. Hero Section Inmersiva
        const Hero = () => {

                                    <img
                                        src="Captura de pantalla 2026-03-22 164700.png"
                                        alt="Plato exclusivo de Restaurante Acuarela"
                                        className="relative z-10 w-full h-[450px] md:h-[650px] object-cover rounded-tl-[60px] rounded-br-[60px] shadow-xl"
                                        onError={(e) => {
                                            e.target.onerror = null;
                                            e.target.src = "https://images.unsplash.com/photo-1544025162-81111421550a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1969&q=80";
                                        }}
                                    />
                                    <div className="absolute -bottom-10 right-0 md:-right-10 bg-white p-6 md:p-8 z-20 shadow-xl max-w-[280px]">
                                        <div className="flex text-premium-gold mb-3">

                                        <p className="font-serif text-lg text-premium-dark italic leading-snug">"Una atmósfera íntima y platos que son lienzos."</p>

                            <Reveal delay="delay-200">
                                <div className="pl-0 lg:pl-8 mt-16 md:mt-0">
